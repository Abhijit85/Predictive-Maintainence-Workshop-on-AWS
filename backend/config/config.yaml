app:
  name: PredictionsEngine
  version: 1.0.0
  debug: false

server:
  host: ${REACT_APP_FASTAPI_HOST:-127.0.0.1}
  port: ${REACT_APP_FASTAPI_PORT:-5001}
  reload: ${FASTAPI_RELOAD:-false}

database:
  connection_string: ${MONGODB_URI:-mongodb://localhost:27017}
  name: ${MONGODB_NAME:-predictions}
  collections:
    input: ${MONGODB_COLLECTION_INPUT:-predictions_input}
    output: ${MONGODB_COLLECTION_OUTPUT:-predictions_output}
    chunks: ${MONGODB_COLLECTION_CHUNKS:-chunks}
    info: ${MONGODB_COLLECTION_INFO:-description}

embeddings:
  model: ${EMBEDDING_MODEL:-voyage/voyage-3}
  chunk_size: 1000
  overlap_size: 200

reranker:
  model: ${RERANKER_MODEL:-voyage/rerank-2}

guardrails:
  bedrock_guardrail_id: ${BEDROCK_GUARDRAIL_ID:-}
  bedrock_guardrail_version: ${BEDROCK_GUARDRAIL_VERSION:-}

alerts:
  sns_topic_arn: ${SNS_ALERT_TOPIC_ARN:-}

models:
  model_folder: models/
  encoder_folder: encoders/
  dataset_folder: datasets/
  test_size: 0.3
  random_state: 42

data_processing:
  folder: data_processing/data
  info_path: data_processing/info.csv

logging:
  level: INFO
  handlers:
    - console
